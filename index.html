<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyClassroom Pro - Ultra Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <nav class="bg-white shadow-sm border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer" onclick="location.reload()">
                <i class="fas fa-graduation-cap text-indigo-600 text-2xl"></i>
                <span class="font-bold text-xl">MyClassroom</span>
            </div>
            <div class="flex items-center gap-4">
                <div class="bg-gray-100 p-1 rounded-lg flex text-xs font-bold">
                    <button id="btn-role-guru" onclick="setRole('guru')" class="px-3 py-1.5 rounded-md text-gray-500">GURU</button>
                    <button id="btn-role-siswa" onclick="setRole('siswa')" class="px-3 py-1.5 rounded-md bg-white shadow-sm text-indigo-600">SISWA</button>
                </div>
                <button id="btn-tambah-materi" onclick="tambahMateri()" class="hidden bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold text-xs">+ Materi</button>
            </div>
        </div>
    </nav>

    <main id="dashboard" class="max-w-7xl mx-auto px-4 py-8">
        <h1 id="dashboard-title" class="text-2xl font-bold mb-6 text-indigo-900 text-center uppercase">Mode Siswa</h1>
        
        <div id="absensi-section" class="max-w-4xl mx-auto mb-8 bg-white border-2 border-orange-100 rounded-2xl p-6 shadow-sm">
            <div class="flex items-center justify-between">
                <div>
                    <h3 class="font-bold text-orange-800 text-lg"><i class="fas fa-user-check mr-2"></i>Absensi Hari Ini</h3>
                    <p class="text-sm text-gray-500">Pastikan Anda sudah absen sebelum mulai belajar.</p>
                </div>
                <button onclick="kirimAbsen()" class="bg-orange-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-orange-600 transition shadow-md">Absen Masuk</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl mx-auto">
            <div onclick="openClass('Matematika Dasar')" class="bg-white border-2 border-indigo-100 rounded-2xl p-8 cursor-pointer hover:border-indigo-500 hover:shadow-xl transition-all group">
                <div class="flex justify-between items-center">
                    <div>
                        <h2 class="text-2xl font-bold text-indigo-800">Matematika Dasar</h2>
                        <p class="text-gray-500 mt-1">Klik untuk Masuk Kelas</p>
                    </div>
                    <div class="w-12 h-12 bg-indigo-50 rounded-full flex items-center justify-center group-hover:bg-indigo-600 transition">
                        <i class="fas fa-arrow-right text-indigo-600 group-hover:text-white"></i>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <section id="class-detail" class="hidden max-w-5xl mx-auto px-4 py-8">
        <button onclick="showDashboard()" class="mb-6 text-indigo-600 font-bold flex items-center gap-2 hover:translate-x-[-5px] transition-transform">
            <i class="fas fa-arrow-left"></i> Kembali ke Dashboard
        </button>
        
        <div class="bg-white rounded-3xl shadow-xl border overflow-hidden">
            <div class="flex bg-gray-50 border-b p-2 gap-2">
                <button onclick="switchTab('materi')" id="tab-materi" class="flex-1 py-3 rounded-xl bg-white shadow-sm text-indigo-600 font-bold uppercase text-xs">Materi</button>
                <button onclick="switchTab('laporan')" id="tab-laporan" class="flex-1 py-3 rounded-xl text-gray-500 font-bold uppercase text-xs text-center">Tugas & Nilai</button>
                <button onclick="switchTab('absensi-list')" id="tab-absensi-list" class="hidden flex-1 py-3 rounded-xl text-gray-500 font-bold uppercase text-xs">Rekap Absen</button>
            </div>

            <div id="content-materi" class="p-6">
                <div id="list-materi" class="space-y-4 mb-10"></div>
                <hr class="my-8">
                <h3 class="font-bold mb-4 text-indigo-900 flex items-center gap-2"><i class="fas fa-comments"></i> Tanya Jawab</h3>
                <div id="chat-box" class="h-64 overflow-y-auto bg-gray-50 rounded-2xl p-4 space-y-3 mb-4 border shadow-inner"></div>
                <div class="flex gap-2">
                    <input id="chat-nama" type="text" placeholder="Nama" class="w-24 border rounded-xl px-3 py-3 text-sm outline-none">
                    <input id="chat-pesan" type="text" placeholder="Pesan..." class="flex-1 border rounded-xl px-4 py-3 text-sm outline-none">
                    <button onclick="kirimChat()" class="bg-indigo-600 text-white px-6 py-3 rounded-xl"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>

            <div id="content-laporan" class="hidden p-6">
                <div id="stat-guru" class="hidden grid grid-cols-2 gap-4 mb-6 text-white text-center">
                    <div class="bg-indigo-600 p-4 rounded-2xl"><p class="text-[10px] opacity-70">Lapor Selesai</p><h2 id="total-lapor" class="text-xl font-bold">0</h2></div>
                    <div class="bg-green-500 p-4 rounded-2xl"><p class="text-[10px] opacity-70">Selesai Dinilai</p><h2 id="total-dinilai" class="text-xl font-bold">0</h2></div>
                </div>

                <div id="view-siswa-tugas" class="text-center py-10 bg-indigo-50 rounded-3xl border-2 border-dashed border-indigo-200">
                    <h3 class="font-bold text-indigo-900 mb-4">Sudah selesai belajar hari ini?</h3>
                    <button onclick="siswaSelesai()" class="bg-indigo-600 text-white px-10 py-4 rounded-2xl font-bold">Lapor Sekarang</button>
                </div>

                <div id="view-guru-laporan" class="hidden">
                    <table class="w-full text-left bg-white border rounded-xl overflow-hidden">
                        <thead class="bg-gray-100 text-xs font-bold uppercase"><tr class="border-b"><th class="p-4">Siswa</th><th class="p-4">Jam</th><th class="p-4">Nilai</th><th class="p-4">Aksi</th></tr></thead>
                        <tbody id="tabel-laporan"></tbody>
                    </table>
                </div>
            </div>

            <div id="content-absensi-list" class="hidden p-6">
                <h3 class="font-bold mb-4 text-orange-900">Rekap Daftar Hadir Siswa</h3>
                <div class="overflow-hidden border rounded-xl">
                    <table class="w-full text-left bg-white">
                        <thead class="bg-orange-50 text-xs font-bold uppercase text-orange-900"><tr class="border-b"><th class="p-4">Nama Siswa</th><th class="p-4">Waktu Absen</th></tr></thead>
                        <tbody id="tabel-absensi"></tbody>
                    </table>
                </div>
            </div>

        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "GANTI_DENGAN_API_KEY_ANDA",
            databaseURL: "GANTI_DENGAN_DATABASE_URL_ANDA",
            projectId: "GANTI_DENGAN_PROJECT_ID_ANDA"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- GLOBAL FUNCTIONS ---
        window.setRole = (role) => {
            const isGuru = (role === 'guru');
            document.getElementById('btn-role-guru').className = isGuru ? "px-3 py-1.5 rounded-md bg-white shadow-sm text-indigo-600" : "px-3 py-1.5 rounded-md text-gray-500";
            document.getElementById('btn-role-siswa').className = !isGuru ? "px-3 py-1.5 rounded-md bg-white shadow-sm text-indigo-600" : "px-3 py-1.5 rounded-md text-gray-500";
            document.getElementById('dashboard-title').innerText = isGuru ? "Panel Guru" : "Panel Siswa";
            document.getElementById('btn-tambah-materi').style.display = isGuru ? 'block' : 'none';
            document.getElementById('absensi-section').style.display = isGuru ? 'none' : 'block';
            document.getElementById('tab-absensi-list').classList.toggle('hidden', !isGuru);
            document.getElementById('view-guru-laporan').classList.toggle('hidden', !isGuru);
            document.getElementById('stat-guru').classList.toggle('hidden', !isGuru);
            document.getElementById('view-siswa-tugas').classList.toggle('hidden', isGuru);
            window.showDashboard();
        };

        window.showDashboard = () => {
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('class-detail').classList.add('hidden');
        };

        window.openClass = (name) => {
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('class-detail').classList.remove('hidden');
        };

        window.switchTab = (tab) => {
            const tabs = ['materi', 'laporan', 'absensi-list'];
            tabs.forEach(t => {
                document.getElementById('content-' + t).classList.toggle('hidden', t !== tab);
                document.getElementById('tab-' + t).className = t === tab ? "flex-1 py-3 rounded-xl bg-white shadow-sm text-indigo-600 font-bold uppercase text-xs" : "flex-1 py-3 rounded-xl text-gray-500 font-bold uppercase text-xs text-center";
            });
        };

        // --- FITUR MATERI (INPUT & HAPUS) ---
        window.tambahMateri = () => {
            const judul = prompt("Judul Materi:");
            const link = prompt("Link (YouTube/Drive):");
            if (judul && link) {
                push(ref(db, 'materi/'), { judul, link, waktu: new Date().toLocaleDateString() });
            }
        };

        window.hapusMateri = (id) => {
            if (confirm("Hapus materi ini secara permanen?")) {
                remove(ref(db, `materi/${id}`));
            }
        };

        // --- FITUR ABSENSI ---
        window.kirimAbsen = () => {
            const nama = prompt("Masukkan Nama Lengkap Anda untuk Absen:");
            if (nama) {
                push(ref(db, 'absensi/'), { nama, waktu: new Date().toLocaleTimeString() });
                alert("Absen Berhasil! Selamat Belajar.");
            }
        };

        // --- REALTIME SYNC ---
        onValue(ref(db, 'materi/'), (snap) => {
            const list = document.getElementById('list-materi');
            list.innerHTML = "";
            snap.forEach(child => {
                const m = child.val();
                const id = child.key;
                const isGuru = document.getElementById('btn-role-guru').classList.contains('bg-white');
                const hapusBtn = isGuru ? `<button onclick="hapusMateri('${id}')" class="text-red-500 text-[10px] ml-4 font-bold uppercase"><i class="fas fa-trash"></i> Hapus</button>` : "";
                
                list.innerHTML += `
                    <div class="flex justify-between items-center p-4 bg-white border rounded-2xl shadow-sm">
                        <div class="flex items-center gap-3">
                            <i class="fas ${m.link.includes('youtube') ? 'fa-video text-red-500' : 'fa-file-lines text-indigo-500'}"></i>
                            <div><p class="font-bold text-sm">${m.judul}</p><p class="text-[10px] text-gray-400 uppercase">${m.waktu}</p></div>
                        </div>
                        <div class="flex items-center">
                            <a href="${m.link}" target="_blank" class="bg-indigo-600 text-white px-4 py-1.5 rounded-lg text-[10px] font-bold">BUKA</a>
                            ${hapusBtn}
                        </div>
                    </div>`;
            });
        });

        onValue(ref(db, 'absensi/'), (snap) => {
            const tabel = document.getElementById('tabel-absensi');
            tabel.innerHTML = "";
            snap.forEach(child => {
                const a = child.val();
                tabel.innerHTML += `<tr class="border-b text-sm"><td class="p-4 font-bold">${a.nama}</td><td class="p-4 text-gray-500">${a.waktu}</td></tr>`;
            });
        });

        // (Chat & Laporan Nilai tetap ada seperti sebelumnya)
        window.kirimChat = () => {
            const nama = document.getElementById('chat-nama').value;
            const pesan = document.getElementById('chat-pesan').value;
            if (nama && pesan) { push(ref(db, 'chat/'), { nama, pesan }); document.getElementById('chat-pesan').value = ""; }
        };

        onValue(ref(db, 'chat/'), (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.forEach(child => {
                const c = child.val();
                box.innerHTML += `<div class="bg-white p-3 rounded-xl border text-sm shadow-sm"><b class="text-indigo-600">${c.nama}:</b> ${c.pesan}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

        window.siswaSelesai = () => {
            const nama = prompt("Nama Lengkap:");
            if (nama) { push(ref(db, 'laporan/'), { nama, nilai: "-", waktu: new Date().toLocaleTimeString() }); alert("Laporan terkirim!"); }
        };

        window.beriNilai = (id) => {
            const n = prompt("Input Nilai (0-100):");
            if (n) update(ref(db, `laporan/${id}`), { nilai: n });
        };

        onValue(ref(db, 'laporan/'), (snap) => {
            const tabel = document.getElementById('tabel-laporan');
            let lapor = 0; let dinilai = 0;
            tabel.innerHTML = "";
            snap.forEach(child => {
                const l = child.val(); const k = child.key;
                lapor++; if(l.nilai !== "-") dinilai++;
                tabel.innerHTML += `<tr class="border-b text-sm"><td class="p-4 font-bold">${l.nama}</td><td class="p-4 text-gray-400 text-xs">${l.waktu}</td><td class="p-4 text-center"><span class="bg-indigo-100 px-3 py-1 rounded-full font-bold text-indigo-600">${l.nilai}</span></td><td class="p-4 text-right text-indigo-600"><button onclick="beriNilai('${k}')">NILAI</button></td></tr>`;
            });
            document.getElementById('total-lapor').innerText = lapor;
            document.getElementById('total-dinilai').innerText = dinilai;
        });

        // Mulai sebagai Siswa
        window.setRole('siswa');
    </script>
</body>
</html>
