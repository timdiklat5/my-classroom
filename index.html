<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyClassroom Pro - Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <nav class="bg-white shadow-sm border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer" onclick="location.reload()">
                <i class="fas fa-graduation-cap text-indigo-600 text-2xl"></i>
                <span class="font-bold text-xl">MyClassroom</span>
            </div>
            <div class="flex items-center gap-4">
                <div class="bg-gray-100 p-1 rounded-lg flex text-xs font-bold">
                    <button id="btn-role-guru" onclick="setRole('guru')" class="px-3 py-1.5 rounded-md text-gray-500">GURU</button>
                    <button id="btn-role-siswa" onclick="setRole('siswa')" class="px-3 py-1.5 rounded-md bg-white shadow-sm text-indigo-600">SISWA</button>
                </div>
                <button id="btn-tambah-materi" onclick="tambahMateri()" class="hidden bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold text-xs">+ Tambah Materi</button>
            </div>
        </div>
    </nav>

    <main id="dashboard" class="max-w-7xl mx-auto px-4 py-8">
        <h1 id="dashboard-title" class="text-2xl font-bold mb-6 text-indigo-900 text-center uppercase tracking-wide">Mode Siswa</h1>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl mx-auto">
            <div onclick="openClass('Matematika Dasar')" class="bg-white border-2 border-indigo-100 rounded-2xl p-8 cursor-pointer hover:border-indigo-500 hover:shadow-xl transition-all group">
                <div class="flex justify-between items-center">
                    <div>
                        <h2 class="text-2xl font-bold text-indigo-800">Matematika Dasar</h2>
                        <p class="text-gray-500 mt-1">Klik untuk Masuk Kelas</p>
                    </div>
                    <div class="w-12 h-12 bg-indigo-50 rounded-full flex items-center justify-center group-hover:bg-indigo-600 transition">
                        <i class="fas fa-arrow-right text-indigo-600 group-hover:text-white"></i>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <section id="class-detail" class="hidden max-w-5xl mx-auto px-4 py-8">
        <button onclick="showDashboard()" class="mb-6 text-indigo-600 font-bold flex items-center gap-2 hover:translate-x-[-5px] transition-transform">
            <i class="fas fa-arrow-left"></i> Kembali ke Dashboard
        </button>
        
        <div class="bg-white rounded-3xl shadow-xl border overflow-hidden">
            <div class="flex bg-gray-50 border-b p-2 gap-2">
                <button onclick="switchTab('materi')" id="tab-materi" class="flex-1 py-3 rounded-xl bg-white shadow-sm text-indigo-600 font-bold">MATERI</button>
                <button onclick="switchTab('laporan')" id="tab-laporan" class="flex-1 py-3 rounded-xl text-gray-500 font-bold">TUGAS & NILAI</button>
            </div>

            <div id="content-materi" class="p-6">
                <div id="list-materi" class="space-y-4 mb-10"></div>
                <hr class="my-8">
                <h3 class="font-bold mb-4 flex items-center gap-2 text-indigo-900"><i class="fas fa-comments"></i> Tanya Jawab</h3>
                <div id="chat-box" class="h-64 overflow-y-auto bg-gray-50 rounded-2xl p-4 space-y-3 mb-4 border shadow-inner"></div>
                <div class="flex gap-2">
                    <input id="chat-nama" type="text" placeholder="Nama" class="w-24 border rounded-xl px-3 py-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                    <input id="chat-pesan" type="text" placeholder="Ketik pesan..." class="flex-1 border rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                    <button onclick="kirimChat()" class="bg-indigo-600 text-white px-6 py-3 rounded-xl hover:bg-indigo-700"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>

            <div id="content-laporan" class="hidden p-6">
                <div id="view-siswa-tugas" class="text-center py-12 bg-indigo-50 rounded-3xl border-2 border-dashed border-indigo-200">
                    <h3 class="font-bold text-indigo-900 text-xl mb-6">Sudah selesai belajar hari ini?</h3>
                    <button onclick="siswaSelesai()" class="bg-indigo-600 text-white px-12 py-4 rounded-2xl font-bold text-xl shadow-lg hover:scale-105 active:scale-95 transition">Lapor Sekarang</button>
                </div>

                <div id="view-guru-laporan" class="hidden">
                    <h3 class="font-bold mb-4 text-indigo-900">Rekap Nilai Siswa</h3>
                    <div class="overflow-hidden rounded-2xl border bg-white">
                        <table class="w-full text-left">
                            <thead class="bg-gray-50 text-xs font-bold uppercase text-gray-600">
                                <tr>
                                    <th class="p-4">Siswa</th>
                                    <th class="p-4">Jam</th>
                                    <th class="p-4 text-center">Nilai</th>
                                    <th class="p-4 text-right">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="tabel-laporan" class="divide-y"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // CONFIG (PASTIKAN DATA INI BENAR)
        const firebaseConfig = {
            apiKey: "GANTI_API_KEY_ANDA",
            databaseURL: "GANTI_DATABASE_URL_ANDA",
            projectId: "GANTI_PROJECT_ID_ANDA"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- SOLUSI TOMBOL TIDAK BISA DIKLIK ---
        // Kita tempelkan semua fungsi ke objek 'window' secara eksplisit
        
        window.setRole = (role) => {
            const isGuru = (role === 'guru');
            document.getElementById('btn-role-guru').className = isGuru ? "px-3 py-1.5 rounded-md bg-white shadow-sm text-indigo-600" : "px-3 py-1.5 rounded-md text-gray-500";
            document.getElementById('btn-role-siswa').className = !isGuru ? "px-3 py-1.5 rounded-md bg-white shadow-sm text-indigo-600" : "px-3 py-1.5 rounded-md text-gray-500";
            document.getElementById('dashboard-title').innerText = isGuru ? "Panel Guru" : "Panel Siswa";
            document.getElementById('btn-tambah-materi').style.display = isGuru ? 'block' : 'none';
            document.getElementById('view-guru-laporan').classList.toggle('hidden', !isGuru);
            document.getElementById('view-siswa-tugas').classList.toggle('hidden', isGuru);
            console.log("Role switched to: " + role);
        };

        window.showDashboard = () => {
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('class-detail').classList.add('hidden');
        };

        window.openClass = (name) => {
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('class-detail').classList.remove('hidden');
        };

        window.switchTab = (tab) => {
            document.getElementById('content-materi').classList.toggle('hidden', tab !== 'materi');
            document.getElementById('content-laporan').classList.toggle('hidden', tab !== 'laporan');
            document.getElementById('tab-materi').className = tab === 'materi' ? "flex-1 py-3 rounded-xl bg-white shadow-sm text-indigo-600 font-bold" : "flex-1 py-3 rounded-xl text-gray-500 font-bold";
            document.getElementById('tab-laporan').className = tab === 'laporan' ? "flex-1 py-3 rounded-xl bg-white shadow-sm text-indigo-600 font-bold" : "flex-1 py-3 rounded-xl text-gray-500 font-bold";
        };

        window.tambahMateri = () => {
            const judul = prompt("Judul Materi:");
            const link = prompt("Link (YouTube/Drive):");
            if (judul && link) {
                push(ref(db, 'materi/'), { judul, link, waktu: new Date().toLocaleDateString() });
            }
        };

        window.kirimChat = () => {
            const nama = document.getElementById('chat-nama').value;
            const pesan = document.getElementById('chat-pesan').value;
            if (nama && pesan) {
                push(ref(db, 'chat/'), { nama, pesan });
                document.getElementById('chat-pesan').value = "";
            } else { alert("Isi Nama & Pesan!"); }
        };

        window.siswaSelesai = () => {
            const nama = prompt("Masukkan Nama Lengkap Anda:");
            if (nama) {
                push(ref(db, 'laporan/'), { nama, nilai: "-", waktu: new Date().toLocaleTimeString() });
                alert("Laporan Terkirim!");
            }
        };

        window.beriNilai = (id) => {
            const n = prompt("Input Nilai (0-100):");
            if (n) update(ref(db, `laporan/${id}`), { nilai: n });
        };

        // --- REALTIME DATA SYNC ---
        onValue(ref(db, 'materi/'), (snap) => {
            const list = document.getElementById('list-materi');
            list.innerHTML = "";
            snap.forEach(child => {
                const m = child.val();
                list.innerHTML += `
                    <div class="flex justify-between items-center p-4 bg-white border rounded-2xl hover:bg-indigo-50 transition">
                        <span><b class="text-indigo-900">${m.judul}</b></span>
                        <a href="${m.link}" target="_blank" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-md">BUKA</a>
                    </div>`;
            });
        });

        onValue(ref(db, 'chat/'), (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.forEach(child => {
                const c = child.val();
                box.innerHTML += `<div class="bg-white p-3 rounded-xl border shadow-sm text-sm"><b class="text-indigo-600">${c.nama}:</b> ${c.pesan}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

        onValue(ref(db, 'laporan/'), (snap) => {
            const tabel = document.getElementById('tabel-laporan');
            tabel.innerHTML = "";
            snap.forEach(child => {
                const l = child.val();
                const k = child.key;
                tabel.innerHTML += `
                    <tr class="hover:bg-indigo-50 transition">
                        <td class="p-4 font-bold text-gray-800">${l.nama}</td>
                        <td class="p-4 text-xs text-gray-400">${l.waktu}</td>
                        <td class="p-4 text-center"><span class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full font-bold text-xs">${l.nilai}</span></td>
                        <td class="p-4 text-right"><button onclick="beriNilai('${k}')" class="text-indigo-600 font-bold hover:underline">NILAI</button></td>
                    </tr>`;
            });
        });
    </script>
</body>
</html>
