<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyClassroom Pro - Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <div id="login-overlay" class="fixed inset-0 bg-indigo-900 z-[100] flex flex-col items-center justify-center text-white px-6">
        <i class="fas fa-graduation-cap text-6xl mb-6"></i>
        <h1 class="text-3xl font-bold mb-8">Selamat Datang</h1>
        <button onclick="loginGoogle()" class="bg-white text-gray-800 px-8 py-4 rounded-2xl font-bold flex items-center gap-3 shadow-2xl">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
            Masuk dengan Google
        </button>
    </div>

    <nav class="bg-white shadow-sm border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer" onclick="showDashboard()">
                <i class="fas fa-graduation-cap text-indigo-600 text-2xl"></i>
                <span class="font-bold text-xl">MyClassroom</span>
            </div>
            <div class="flex items-center gap-4">
                <div class="bg-gray-100 p-1 rounded-lg flex text-xs font-bold">
                    <button id="btn-role-guru" onclick="setRole('guru')" class="px-3 py-1.5 rounded-md">GURU</button>
                    <button id="btn-role-siswa" onclick="setRole('siswa')" class="px-3 py-1.5 rounded-md bg-white shadow-sm text-indigo-600">SISWA</button>
                </div>
                <img id="user-photo" src="" class="w-8 h-8 rounded-full border hidden">
                <button onclick="logout()" class="text-red-500 font-bold text-sm">Keluar</button>
            </div>
        </div>
    </nav>

    <main id="dashboard" class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex justify-between items-center mb-6">
            <h1 id="dashboard-title" class="text-2xl font-bold">Daftar Kelas</h1>
            <button id="btn-tambah-materi" onclick="tambahMateri()" class="hidden bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold">+ Tambah Materi</button>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div onclick="openClass('Matematika Dasar')" class="bg-white border rounded-xl p-6 cursor-pointer hover:shadow-lg transition">
                <div class="flex justify-between items-start">
                    <div>
                        <h2 class="text-xl font-bold">Matematika Dasar</h2>
                        <p class="text-gray-500">Klik untuk melihat materi & tugas</p>
                    </div>
                    <i class="fas fa-arrow-right text-indigo-600"></i>
                </div>
            </div>
        </div>
    </main>

    <section id="class-detail" class="hidden max-w-5xl mx-auto px-4 py-8">
        <button onclick="showDashboard()" class="mb-4 text-indigo-600 font-bold">&larr; Dashboard</button>
        
        <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
            <div class="flex bg-gray-50 border-b">
                <button onclick="switchTab('materi')" id="tab-materi" class="flex-1 py-4 border-b-2 border-indigo-600 text-indigo-600 font-bold">Materi</button>
                <button onclick="switchTab('laporan')" id="tab-laporan" class="flex-1 py-4 border-b-2 border-transparent text-gray-500 font-bold">Tugas & Nilai</button>
            </div>

            <div id="content-materi" class="p-6">
                <h3 class="font-bold mb-4">Daftar Materi (Drive/YouTube)</h3>
                <div id="list-materi" class="space-y-3">
                    </div>
            </div>

            <div id="content-laporan" class="hidden p-6">
                <div id="view-siswa-tugas" class="text-center py-10">
                    <button onclick="siswaSelesai()" class="bg-green-500 text-white px-10 py-4 rounded-2xl font-bold text-xl shadow-lg">Lapor Selesai</button>
                </div>

                <div id="view-guru-laporan" class="hidden overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-gray-50">
                                <th class="p-3">Siswa</th>
                                <th class="p-3">Waktu</th>
                                <th class="p-3 text-center">Nilai</th>
                                <th class="p-3">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tabel-laporan"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, update, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

       const firebaseConfig = {
  apiKey: "AIzaSyBkLiqHrvTuFFpaVsmWT2H1wF5NzwgmuBQ",
  authDomain: "diklatppsdm-e7788.firebaseapp.com",
  databaseURL: "https://diklatppsdm-e7788-default-rtdb.firebaseio.com",
  projectId: "diklatppsdm-e7788",
  storageBucket: "diklatppsdm-e7788.firebasestorage.app",
  messagingSenderId: "573889493408",
  appId: "1:573889493408:web:fd7704a7d40e72e72c4cc5"
};

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let currentRole = 'siswa';

        // --- GLOBAL FUNCTIONS AGAR BISA DIKLIK ---
        window.loginGoogle = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth).then(() => location.reload());

        window.setRole = (role) => {
            currentRole = role;
            const isGuru = (role === 'guru');
            document.getElementById('btn-role-guru').className = isGuru ? "px-3 py-1.5 rounded-md bg-white shadow-sm text-indigo-600" : "px-3 py-1.5 rounded-md text-gray-500";
            document.getElementById('btn-role-siswa').className = !isGuru ? "px-3 py-1.5 rounded-md bg-white shadow-sm text-indigo-600" : "px-3 py-1.5 rounded-md text-gray-500";
            document.getElementById('btn-tambah-materi').style.display = isGuru ? 'block' : 'none';
            document.getElementById('view-guru-laporan').classList.toggle('hidden', !isGuru);
            document.getElementById('view-siswa-tugas').classList.toggle('hidden', isGuru);
        };

        window.showDashboard = () => {
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('class-detail').classList.add('hidden');
        };

        window.openClass = (name) => {
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('class-detail').classList.remove('hidden');
            document.getElementById('active-class-title').innerText = name;
        };

        window.switchTab = (tab) => {
            document.getElementById('content-materi').classList.toggle('hidden', tab !== 'materi');
            document.getElementById('content-laporan').classList.toggle('hidden', tab !== 'laporan');
            document.getElementById('tab-materi').className = tab === 'materi' ? "flex-1 py-4 border-b-2 border-indigo-600 text-indigo-600 font-bold" : "flex-1 py-4 border-b-2 border-transparent text-gray-500 font-bold";
            document.getElementById('tab-laporan').className = tab === 'laporan' ? "flex-1 py-4 border-b-2 border-indigo-600 text-indigo-600 font-bold" : "flex-1 py-4 border-b-2 border-transparent text-gray-500 font-bold";
        };

        // --- LOGIKA DATA (MATERI & NILAI) ---
        window.tambahMateri = () => {
            const judul = prompt("Judul Materi:");
            const link = prompt("Link (Drive/YouTube):");
            if (judul && link) {
                push(ref(db, 'materi/'), { judul, link, waktu: new Date().toLocaleDateString() });
            }
        };

        window.siswaSelesai = () => {
            if (!currentUser) return;
            push(ref(db, 'laporan/'), {
                nama: currentUser.displayName,
                waktu: new Date().toLocaleTimeString(),
                nilai: "-"
            });
            alert("Laporan dikirim!");
        };

        window.beriNilai = (id) => {
            const n = prompt("Input Nilai (0-100):");
            if (n) update(ref(db, `laporan/${id}`), { nilai: n });
        };

        // --- REALTIME SYNC ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('user-photo').src = user.photoURL;
                document.getElementById('user-photo').classList.remove('hidden');
                syncData();
            }
        });

        function syncData() {
            // Muat Materi
            onValue(ref(db, 'materi/'), (snap) => {
                const list = document.getElementById('list-materi');
                list.innerHTML = "";
                snap.forEach(child => {
                    const m = child.val();
                    list.innerHTML += `
                        <div class="flex justify-between items-center p-4 bg-white border rounded-xl">
                            <span><b>${m.judul}</b></span>
                            <a href="${m.link}" target="_blank" class="text-indigo-600 font-bold">Buka &rarr;</a>
                        </div>`;
                });
            });

            // Muat Laporan (Untuk Guru)
            onValue(ref(db, 'laporan/'), (snap) => {
                const tabel = document.getElementById('tabel-laporan');
                tabel.innerHTML = "";
                snap.forEach(child => {
                    const l = child.val();
                    const k = child.key;
                    tabel.innerHTML += `
                        <tr class="border-b">
                            <td class="p-3 font-bold">${l.nama}</td>
                            <td class="p-3 text-xs text-gray-400">${l.waktu}</td>
                            <td class="p-3 text-center font-bold text-green-600">${l.nilai}</td>
                            <td class="p-3"><button onclick="beriNilai('${k}')" class="text-indigo-600 text-xs underline">Input Nilai</button></td>
                        </tr>`;
                });
            });
        }
    </script>
</body>
</html>
